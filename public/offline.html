<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Çevrimdışısınız — Kırşehir Görme Engelliler Derneği</title>
  <style>
    :root { --primary: #4F46E5; --bg: #0F1117; --text: #E0E7FF; --muted: #94A3B8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .icon { width: 80px; height: 80px; margin-bottom: 1.5rem; color: var(--primary); }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: var(--muted); line-height: 1.6; max-width: 40ch; margin: 0 auto 0.5rem; }
    .contacts { margin-top: 2rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .contact-item { display: flex; align-items: center; gap: 0.5rem; justify-content: center; color: var(--text); text-decoration: none; font-weight: 500; }
    .contact-item:hover { color: var(--primary); }
    .btn { margin-top: 2rem; display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.75rem; background: var(--primary); color: #fff; border-radius: 9999px; text-decoration: none; font-weight: 600; font-size: 0.95rem; }
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 1l22 22M16.5 16.5A3.5 3.5 0 0 1 12 20a3.5 3.5 0 0 1-3.5-3.5"/>
    <path d="M6.52 6.52A10.94 10.94 0 0 0 1.05 12S5 20 12 20a10.93 10.93 0 0 0 5.28-1.36"/>
    <path d="M10.9 5.08A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a20.5 20.5 0 0 1-1.68 2.48"/>
  </svg>
  <h1>Çevrimdışısınız</h1>
  <p>İnternet bağlantınız yok. Lütfen bağlantınızı kontrol edin ve tekrar deneyin.</p>
  <p>Bize doğrudan ulaşabilirsiniz:</p>
  <div class="contacts">
    <a href="tel:+904567890123" class="contact-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.79a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Telefon ile arayın
    </a>
    <a href="mailto:kirsehirgormeengellilerdernegi@gmail.com" class="contact-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      kirsehirgormeengellilerdernegi@gmail.com
    </a>
  </div>
  <a href="/" class="btn" onclick="window.location.reload()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
    Tekrar Dene
  </a>
</body>
</html>
